<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>ForceHub PHP</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <h1>ForceHub PHP Scaffold</h1>

  <section>
    <h2>Models</h2>
    <button id="loadModels">Load Models</button>
    <pre id="modelsOutput">Waiting...</pre>
  </section>

  <section>
    <h2>Chat</h2>
    <textarea id="prompt" placeholder="Ask ForceHub..."></textarea>
    <button id="sendChat">Send</button>
    <pre id="chatOutput">Waiting...</pre>
  </section>

  <script src="/js/app.js"></script>
</body>
</html>
