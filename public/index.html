<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ForceHub C++</title>
  <style>
    body { background:#0b0f19; color:#e6edf3; font-family:monospace; padding:20px }
    button { margin:5px; padding:6px 10px }
    pre { background:#111827; padding:10px; overflow:auto }
  </style>
</head>
<body>

<h1>ForceHub C++</h1>

<h2>Models</h2>
<button onclick="loadModels()">Load Models</button>
<pre id="modelsOutput"></pre>

<h2>Files</h2>
<button onclick="loadFiles()">Load Files</button>
<div id="filesOutput"></div>

<h2>Chat</h2>
<input id="prompt" placeholder="Ask something..." size="50">
<button onclick="sendChat()">Send</button>
<pre id="chatOutput"></pre>

<script src="/js/app.js"></script>

</body>
</html>
